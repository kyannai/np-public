<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP Feedback — Cluster Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f4f6f9;
    min-height: 100vh;
    padding: 36px 28px 48px;
    color: #1e2a38;
  }
  .page-header {
    max-width: 1400px;
    margin: 0 auto 28px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .page-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #1e2a38;
    letter-spacing: -0.01em;
  }
  .page-header .meta {
    font-size: 12px;
    color: #8a97a8;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #4a6fa5;
    text-decoration: none;
    margin-bottom: 20px;
    max-width: 1400px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .back-link:hover { text-decoration: underline; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 14px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: #ffffff;
    border-radius: 8px;
    border: 1px solid #dde3ec;
    overflow: hidden;
  }
  .card-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #edf0f5;
  }
  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-icon svg {
    width: 16px;
    height: 16px;
    stroke-width: 1.75;
    fill: none;
    stroke: currentColor;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .card-title {
    font-size: 13px;
    font-weight: 650;
    flex: 1;
    letter-spacing: -0.01em;
  }
  .card-count {
    font-size: 11px;
    font-weight: 600;
    color: #8a97a8;
    background: #f0f3f8;
    border-radius: 10px;
    padding: 2px 8px;
  }
  .sub-list {
    padding: 8px 0;
  }
  .sub-item {
    padding: 4px 14px 4px 44px;
    font-size: 12px;
    color: #4a5568;
    line-height: 1.4;
    position: relative;
  }
  .sub-item::before {
    content: '';
    position: absolute;
    left: 28px;
    top: 10px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #c8d0db;
  }

  /* Colour themes per cluster */
  .theme-slate    { background: #eef1f6; color: #3d5275; }
  .theme-red      { background: #fdf0f0; color: #9b3535; }
  .theme-green    { background: #eef7f1; color: #2d6a4f; }
  .theme-yellow   { background: #fdf8ec; color: #8a6200; }
  .theme-purple   { background: #f3f0fb; color: #5b3fa0; }
  .theme-crimson  { background: #fdeaea; color: #8c1c1c; }
  .theme-amber    { background: #fdf3e7; color: #9a4e00; }
  .theme-teal     { background: #eaf6f5; color: #1e6b60; }
  .theme-blue     { background: #eaf2fb; color: #2a5f9e; }
  .theme-indigo   { background: #eeeffe; color: #3a3fa8; }
  .theme-sage     { background: #edf5ef; color: #3a6645; }
  .theme-violet   { background: #f5eeff; color: #6b3fa0; }
  .theme-rose     { background: #fdeef2; color: #9b2d4a; }
  .theme-sky      { background: #e9f4fb; color: #1a5e82; }
  .theme-warm     { background: #fdf3ec; color: #884a20; }
  .theme-steel    { background: #ecf1f7; color: #3a5470; }
  .theme-moss     { background: #edf4ec; color: #3a6040; }
  .theme-dusty    { background: #f5f0fb; color: #6a4580; }
  .theme-ocean    { background: #e8f4fa; color: #1a5c7a; }
  .theme-graphite { background: #f0f2f5; color: #3a4558; }
  .theme-sienna   { background: #faeee8; color: #8a3820; }
  .theme-navy     { background: #e8eef8; color: #1e3a6a; }
</style>
</head>
<body>

<a class="back-link" href="index.html">&#8592; Back to Home</a>

const grid = document.getElementById('grid');
clusters.forEach(cl => {
  const card = document.createElement('div');
  card.className = 'card';

  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = `
    <div class="card-icon theme-${cl.theme}">${cl.icon}</div>
    <span class="card-title">${cl.name}</span>
    <span class="card-count">${cl.subs.length}</span>
  `;

  const list = document.createElement('div');
  list.className = 'sub-list';
  cl.subs.forEach(s => {
    const item = document.createElement('div');
    item.className = 'sub-item';
    item.textContent = s;
    list.appendChild(item);
  });

  card.appendChild(header);
  card.appendChild(list);
  grid.appendChild(card);
});
</script>
</body>
</html>
